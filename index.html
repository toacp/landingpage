<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Landing Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <h1>Welcome to Our Product</h1>
        <p>Short tagline that convinces visitors to sign up.</p>
      </div>
      <div class="hero-media">
        <video class="hero-video" controls autoplay muted loop playsinline poster="assets/poster.svg">
          <source src="WhatsApp%20Video%202026-05-17%20at%201.25.33%20PM.mp4" type="video/mp4" />
          <source src="assets/hero.mp4" type="video/mp4" />
          <p>Your browser does not support the video tag. Please download the video <a href="WhatsApp%20Video%202026-05-17%20at%201.25.33%20PM.mp4">here</a>.</p>
        </video>
      </div>
    </header>

    <main class="content">
      <section class="signup">
        <h2>Sign up for updates</h2>
        <form id="landingForm">
          <label for="email">Email (required)</label>
          <input id="email" name="email" type="email" required />

          <fieldset>
            <legend>Are you interested?</legend>
            <label><input type="radio" name="interest" value="yes" required /> Yes</label>
            <label><input type="radio" name="interest" value="no" /> No</label>
          </fieldset>

          <label for="details">Additional details</label>
          <textarea id="details" name="details" rows="4"></textarea>

          <button type="submit">Submit</button>
          <p id="status" class="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
